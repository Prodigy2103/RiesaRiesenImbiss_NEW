<div class="footer-btn">
	<app-neon-button class="modal-close-neon" (click)="toggleMenu()">
		<div class="burger-menu" [class.active]="isMenuOpen()">
			<span class="burger-line"></span>
			<span class="burger-line"></span>
			<span class="burger-line"></span>
		</div>
	</app-neon-button>
</div>

<footer class="sidebar-footer" [class.is-open]="isMenuOpen()">
	<app-footer-section title="NEUIGKEITEN" [items]="news" (select)="handleNewsClick($event)">
	</app-footer-section>

	<div class="footer-divider"></div>

	<app-footer-section title="JOBS" [items]="jobs" (select)="handleJobClick($event)">
	</app-footer-section>

	<div class="footer-divider"></div>

	<app-footer-section title="INFO & REZEPTUREN" [items]="infoCategories()" displayKey="label"
		(select)="openCategoryInfo($event)">
	</app-footer-section>

	<div class="footer-divider"></div>

	<div class="footer-section">
		<div class="section-label">
			<span class="label-dot accent"></span>
			SOCIAL MEDIA
		</div>
		<div class="social-links-row">
			<a href="https://www.instagram.com/..." target="_blank" class="social-icon-link">
				<img src="assets/img/instagrram_logo.png" alt="Instagram" />
			</a>
			<a href="https://www.tiktok.com/..." target="_blank" class="social-icon-link">
				<img src="assets/img/vecteezy_tiktok-png-icon_16716450.png" alt="TikTok" />
			</a>
		</div>
	</div>

	<div class="footer-copy">© 2025 Riesen Imbiss</div>
</footer>

<app-footer-modals></app-footer-modals>
