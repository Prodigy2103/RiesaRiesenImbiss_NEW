<section class="find-us-container">
    <div class="top-row">
        <div class="info-card">
            <h2 class="cyber-title">Location Data</h2>
            <p class="address">
                <strong>Riesenimbiss Riesa</strong><br>
                Dr.-Scheider-Straße 36 <br> 01589 Riesa
            </p>
            <div class="hours-grid">
                <span class="day">Mo - Sa</span><span class="time">11:00 - 21:30</span>
                <span class="day">Sonntag</span><span class="time">13:00 - 20:00</span>
            </div>
        </div>

        <div class="map-wrapper">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2501.033506456381!2d13.29517177703816!3d51.31046182512684!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47a861633513a967%3A0xc3f9829871790403!2sDr.-Scheider-Str.%2036%2C%2001589%20Riesa!5e0!3m2!1sde!2sde!4v1715600000000!5m2!1sde!2sde"
                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </div>

    <div class="feedback-row">
        <div class="feedback-form">
            <h2 class="cyber-title">User Feedback</h2>

            <div class="star-rating">
                <span *ngFor="let s of [0,1,2,3,4]" class="star" (click)="setRating($event, s)"
                    [style.--percent]="getStarFill(s, currentRating)">★</span>
                <span class="rating-display">{{ currentRating }}</span>
            </div>

            <div class="input-group name-input">
                <input type="text" [(ngModel)]="userName" placeholder="DEIN_CODE_NAME...">
                <div class="glow-line"></div>
            </div>

            <div class="input-group">
                <textarea [(ngModel)]="userComment" placeholder="Dein Log-Eintrag..."></textarea>
                <div class="glow-line"></div>
            </div>
            <app-neon-button variant="primary" (click)="submitFeedback()">UPLOAD COMMENT</app-neon-button>
        </div>

        <div class="comments-display">
            <h3 class="cyber-subtitle" (dblclick)="toggleAdmin()">Recent Logs</h3>

            <div class="scroll-area">
                <div class="comment-entry" *ngFor="let c of comments()">
                    <div class="entry-header">
                        <span class="user-id">{{c.author}}</span>

                        <button *ngIf="adminMode()" class="delete-btn" (click)="deleteComment(c.id)">
                            DELETE_LOG
                        </button>

                        <div class="stars-display">
                            <span *ngFor="let s of [0,1,2,3,4]" class="mini-star"
                                [style.--percent]="getStarFill(s, c.rating)">★</span>
                        </div>
                    </div>
                    <p class="comment-text">"{{c.text}}"</p>
                </div>
            </div>
        </div>
    </div>
</section>
